<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ravenex Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a090f;
      --card: #120f1a;
      --ink: #e2e8f0;
      --ink2: #8899aa;
      --primary: #e879f9;
      --border: rgba(232,121,249,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
    }
    .header h1 {
      font-size: 22px;
      color: var(--primary);
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    /* LEFT PANEL - CONTROLS */
    .controls {
      width: 400px;
      padding: 30px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
    }
    select {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--ink);
      border-radius: 8px;
      font-family: inherit;
      cursor: pointer;
    }
    optgroup {
      background: var(--bg);
      color: var(--primary);
      font-weight: bold;
    }
    option {
      background: var(--card);
      color: var(--ink);
    }
    button.primary {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
    }
    button.primary:hover { opacity: 0.9; transform: translateY(-1px); }
    button.primary:disabled { background: var(--border); color: var(--ink2); cursor: not-allowed; transform: none; }
    
    .status-msg {
      text-align: center;
      font-size: 14px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* RIGHT PANEL - PREVIEW */
    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
    }
    .preview-bar {
      padding: 12px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }
    .preview-bar button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .preview-bar button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .preview-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      width: 120px;
      text-align: center;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Ravenex Post Generator</h1>
    <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2)">GitHub Pages Deployment Ready</div>
  </div>

  <div class="container">
    <!-- Left Panel -->
    <div class="controls">
      <div class="field-group">
        <label>1. Select Topic</label>
        <select id="topicSelect" disabled>
          <option value="">Loading topics...</option>
        </select>
      </div>

      <div class="field-group">
        <label>2. Select Theme</label>
        <select id="themeSelect">
          <option value="dark">Dark Theme (e.g. Post 54)</option>
          <option value="light">Light Theme (e.g. Post 58)</option>
        </select>
      </div>

      <button id="generateBtn" class="primary" disabled>Generate & Copy Prompt</button>
      <div id="statusMsg" class="status-msg">Mega-Prompt Copied to Clipboard!</div>
      
      <div style="margin-top:auto; font-size:12px; color:var(--ink2); line-height:1.5;">
        <strong>How it works:</strong><br>
        1. Pick a topic.<br>
        2. Pick a theme. Light uses post58.html as a skeleton, Dark uses post54.html.<br>
        3. Click generate.<br>
        4. Paste into Claude.
      </div>
    </div>

    <!-- Right Panel -->
    <div class="preview">
      <div class="preview-bar">
        <button id="prevBtn">&larr; Prev Post</button>
        <div class="preview-title">Post <span id="previewNum">60</span></div>
        <button id="nextBtn">Next Post &rarr;</button>
      </div>
      <iframe id="previewFrame" src="post60.html"></iframe>
    </div>
  </div>

  <script>
    let topics = [];
    const topicSelect = document.getElementById('topicSelect');
    const generateBtn = document.getElementById('generateBtn');
    const statusMsg = document.getElementById('statusMsg');
    
    // Iframe Previewer Logic
    let currentPreview = 60;
    const previewNum = document.getElementById('previewNum');
    const previewFrame = document.getElementById('previewFrame');
    
    function updatePreview() {
      previewNum.textContent = currentPreview;
      previewFrame.src = \`post\${currentPreview}.html\`;
    }
    
    document.getElementById('prevBtn').addEventListener('click', () => {
      if(currentPreview > 1) currentPreview--;
      updatePreview();
    });
    
    document.getElementById('nextBtn').addEventListener('click', () => {
      currentPreview++;
      updatePreview();
    });

    // Auto-fetch topics.txt
    async function init() {
      try {
        const response = await fetch('topics.txt');
        if (!response.ok) throw new Error("Failed to fetch topics.txt");
        const text = await response.text();
        
        const lines = text.split('\\n');
        let currentGroup = null;
        let selectHtml = '<option value="">Select a topic...</option>';
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          
          if (line.startsWith('---') && line.endsWith('---')) {
            if (currentGroup) selectHtml += '</optgroup>';
            currentGroup = line.replace(/---/g, '').trim();
            selectHtml += \`<optgroup label="\${currentGroup}">\`;
          } else {
            const topicMatch = line.match(/^(\\d+\\.\\s+.*)/);
            const focusMatch = line.match(/^-\\s+Focus:\\s+(.*)/);
            
            if (topicMatch) {
              topics.push({ title: topicMatch[1], focus: "" });
            } else if (focusMatch && topics.length > 0) {
              topics[topics.length - 1].focus = focusMatch[1];
              const idx = topics.length - 1;
              selectHtml += \`<option value="\${idx}">\${topics[idx].title}</option>\`;
            }
          }
        }
        if (currentGroup) selectHtml += '</optgroup>';
        
        topicSelect.innerHTML = selectHtml;
        topicSelect.disabled = false;
      } catch (err) {
        topicSelect.innerHTML = '<option value="">Error loading topics</option>';
        console.error(err);
      }
    }

    topicSelect.addEventListener('change', () => {
      generateBtn.disabled = (topicSelect.value === "");
    });

    // Generate logic
    generateBtn.addEventListener('click', async () => {
      generateBtn.disabled = true;
      generateBtn.textContent = "Fetching template...";
      
      try {
        const theme = document.getElementById('themeSelect').value;
        const templateFile = theme === 'light' ? 'post58.html' : 'post54.html';
        
        const response = await fetch(templateFile);
        if (!response.ok) throw new Error("Template not found");
        const templateHtml = await response.text();
        
        const topic = topics[topicSelect.value];
        
        const prompt = \`Act as an expert technical content creator and senior frontend developer for Ravenex Technologies.
Your task is to create a 7-slide HTML/CSS carousel post about the following topic:

TOPIC: \${topic.title}
FOCUS: \${topic.focus}

You must use the EXACT HTML and CSS structure provided below. Do not change the overall layout, the flexbox carousel mechanism, or the JavaScript logic. 
Only change the content (titles, text, code blocks, stats, footer branding) and the caption at the bottom to match the new topic.

THEME INSTRUCTIONS:
This post should use a \${theme.toUpperCase()} theme style based closely on the template provided. Keep the structural CSS exactly the same, but you may alter the accent color variables in the :root block (and their corresponding utility classes like .fc, .yl, .cy) to match the general vibe of the topic.

CAPTION INSTRUCTIONS:
Write a punchy, storytelling caption in the .caption-text section at the bottom. Start with a dramatic hook about the problem, transition into the evolution/history, explain the core technical solution, and end with a killer closing thought. Include the hashtag #ravenextechnologies.

Here is the base template to start from:

\`\`\`html
\${templateHtml}
\`\`\`

Output ONLY the raw HTML code inside a single html codeblock. Do not include any conversational filler.\`;

        // Use modern clipboard API or fallback
        try {
          await navigator.clipboard.writeText(prompt);
        } catch(e) {
          const ta = document.createElement('textarea');
          ta.value = prompt; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy');
          document.body.removeChild(ta);
        }
        
        statusMsg.style.opacity = '1';
        setTimeout(() => { statusMsg.style.opacity = '0'; }, 3000);
        
      } catch(err) {
        alert("Error generating prompt: " + err.message);
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Generate & Copy Prompt";
      }
    });

    init();
  </script>
</body>
</html>
