<title>Every Claude Code That Actually Works — Cheatsheet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1714;--card:#f4f0ea;--ink:#1a1714;--dim:#6b6560;--acc:#d45a1a;--green:#1a7a42;--purple:#6b4fa0;--blue:#2563eb;--bar:#2a2520}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:'Inter Tight',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:40px 20px 80px}
.poster{width:min(92vw,540px);background:var(--card);color:var(--ink);position:relative;overflow:hidden}
.top-bar{background:var(--bar);height:6px;width:100%}
.inner{padding:32px 34px 28px}
.sm{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:10px;border-bottom: 1px solid rgba(26,23,20,.08);padding:0px 0px 4px;}
.kicker{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:4px 10px;margin-bottom:12px;border:1px solid var(--ink);color:var(--ink);font-weight:500}
h1{font-family:'Inter Tight',sans-serif;font-weight:900;font-size:38px;line-height:.9;letter-spacing:-.03em;text-transform:uppercase;margin-bottom:6px;color:var(--ink)}
h1 .acc{color:var(--acc)}
.subtitle{font-size:13px;color:var(--dim);margin-bottom:14px;line-height:1.4}
.section{margin-bottom:14px}
.sec-head{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;font-weight:600;padding-bottom:5px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-head .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sec-head.orange{color:var(--acc);border-bottom:1px solid rgba(212,90,26,.2)}.sec-head.orange .dot{background:var(--acc)}
.sec-head.purple{color:var(--purple);border-bottom:1px solid rgba(107,79,160,.2)}.sec-head.purple .dot{background:var(--purple)}
.sec-head.green{color:var(--green);border-bottom:1px solid rgba(26,122,66,.2)}.sec-head.green .dot{background:var(--green)}
.sec-head.blue{color:var(--blue);border-bottom:1px solid rgba(37,99,235,.2)}.sec-head.blue .dot{background:var(--blue)}
.row{display:flex;gap:4px;align-items:baseline;padding:2px 0;font-size:12px;line-height:1.4}
.code{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;min-width:90px;flex-shrink:0}
.code.orange{color:var(--acc)}.code.purple{color:var(--purple)}.code.green{color:var(--green)}.code.blue{color:var(--blue)}
.desc{color:var(--dim);font-size:11.5px}
.note{font-size:10px;color:var(--dim);line-height:1.45;margin-top:12px;padding:10px 12px;background:rgba(26,23,20,.03);border-left:2px solid var(--acc)}
.footer{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid rgba(26,23,20,.08);margin-top:8px}
.footer .handle{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}
.footer .save{font-size:12px;color:var(--dim)}
.dl-wrap{display:flex;justify-content:center;margin-top:24px}
.dl-btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:12px 28px;background:transparent;border:1px solid var(--acc);color:var(--acc);cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px}.dl-btn:hover{background:var(--acc);color:#fff}.dl-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.dl-btn:disabled{opacity:.4;cursor:wait}
</style>
</head>
